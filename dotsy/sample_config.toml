# Dotsy Configuration File
# Located at ~/.dotsy/config.toml

# Active model alias (choose from the models listed below)
active_model = "devstral-2"

# UI Theme: "terminal", "textual-dark", "textual-light", etc.
textual_theme = "terminal"

# Enable Vim keybindings
vim_keybindings = false

# Disable welcome banner animation
disable_welcome_banner_animation = false

# Auto-approve tool executions (use with caution)
auto_approve = false

# System prompt ID
system_prompt_id = "cli"

# Include commit signature in commits
include_commit_signature = true

# Include model info in responses
include_model_info = true

# Include project context
include_project_context = true

# Include prompt detail
include_prompt_detail = true

# Enable update checks
enable_update_checks = true

# Enable auto update
enable_auto_update = true

# API timeout in seconds
api_timeout = 720.0

# Auto-compact threshold (tokens)
auto_compact_threshold = 200000

# Context warnings
context_warnings = false

# Providers configuration
[[providers]]
name = "dotsy"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "openai"
backend = "dotsy"

[[providers]]
name = "openai"
api_base = "https://api.openai.com/v1"
api_key_env_var = "OPENAI_API_KEY"
api_style = "openai"
backend = "generic"

[[providers]]
name = "anthropic"
api_base = "https://api.anthropic.com/v1"
api_key_env_var = "ANTHROPIC_API_KEY"
api_style = "anthropic"
backend = "generic"

[[providers]]
name = "google"
api_base = "https://generativelanguage.googleapis.com/v1beta"
api_key_env_var = "GOOGLE_API_KEY"
api_style = "openai"
backend = "generic"

[[providers]]
name = "llamacpp"
api_base = "http://127.0.0.1:8080/v1"
api_key_env_var = ""
api_style = "openai"
backend = "generic"

[[providers]]
name = "ollama"
api_base = "http://127.0.0.1:11434/v1"
api_key_env_var = ""
api_style = "openai"
backend = "generic"

[[providers]]
name = "qwen"
api_base = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key_env_var = "DASHSCOPE_API_KEY"
api_style = "openai"
backend = "generic"

